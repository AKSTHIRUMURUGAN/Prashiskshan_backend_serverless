# Prashiskshan API Documentation
# This file contains comprehensive API documentation for all endpoints
#
# API Routes Organization:
# ========================
# 1. AUTHENTICATION (/api/auth/*)
#    - POST   /auth/students/register      - Register new student
#    - POST   /auth/companies/register     - Register new company
#    - POST   /auth/mentors/register        - Register new mentor
#    - POST   /auth/admins/register         - Register new admin
#    - POST   /auth/login                   - User login
#    - POST   /auth/send-password-reset     - Send password reset email
#    - POST   /auth/verify-email            - Send email verification
#    - GET    /auth/verify-email            - Verify email with code
#    - GET    /auth/me                      - Get current user profile
#    - PATCH  /auth/me                      - Update user profile
#    - POST   /auth/password                - Change password
#    - POST   /auth/profile/image           - Upload profile image
#    - POST   /auth/profile/resume          - Upload resume
#    - DELETE /auth/account                 - Delete account
#
# 2. STUDENTS (/api/students/*)
#    - GET    /students/dashboard                    - Get student dashboard
#    - GET    /students/internships                   - Browse internships
#    - GET    /students/internships/recommended       - Get recommended internships
#    - POST   /students/applications                  - Apply to internship
#    - GET    /students/applications                  - Get my applications
#    - DELETE /students/applications/:id              - Withdraw application
#    - GET    /students/modules/recommended           - Get recommended modules
#    - POST   /students/modules/start                 - Start learning module
#    - POST   /students/modules/complete              - Complete learning module
#    - POST   /students/interviews/start              - Start interview practice
#    - POST   /students/interviews/answer             - Submit interview answer
#    - POST   /students/interviews/end                - End interview session
#    - GET    /students/interviews/history           - Get interview history
#    - POST   /students/logbooks                      - Submit logbook
#    - GET    /students/logbooks                      - Get my logbooks
#    - GET    /students/credits                       - Get credits summary
#    - POST   /students/reports/nep                   - Generate NEP report
#    - POST   /students/chatbot                       - Chatbot query
#
# 3. COMPANIES (/api/companies/*)
#    - GET    /companies/dashboard                           - Get company dashboard
#    - GET    /companies/profile                             - Get company profile
#    - PATCH  /companies/profile                             - Update company profile
#    - POST   /companies/internships                         - Create internship
#    - GET    /companies/internships                         - Get all internships
#    - PUT    /companies/internships/:id                     - Update internship
#    - DELETE /companies/internships/:id                     - Delete internship
#    - POST   /companies/internships/:id/complete           - Mark internship complete
#    - GET    /companies/internships/:id/applicants         - Get applicants
#    - POST   /companies/applications/review                - Review applications
#    - POST   /companies/applications/shortlist             - Shortlist candidates
#    - POST   /companies/applications/reject                 - Reject candidates
#    - GET    /companies/interns/progress                    - Get intern progress
#    - POST   /companies/logbooks/:id/feedback               - Provide logbook feedback
#    - POST   /companies/events                              - Create event
#    - POST   /companies/challenges                          - Create challenge
#
# 4. MENTORS (/api/mentors/*)
#    - GET    /mentors/dashboard                            - Get mentor dashboard
#    - GET    /mentors/applications/pending                 - Get pending applications
#    - GET    /mentors/applications/:id                     - Get application details
#    - POST   /mentors/applications/:id/approve             - Approve application
#    - POST   /mentors/applications/:id/reject               - Reject application
#    - GET    /mentors/logbooks/pending                     - Get pending logbooks
#    - GET    /mentors/logbooks/:id                         - Get logbook details
#    - POST   /mentors/logbooks/:id/approve                 - Approve logbook
#    - POST   /mentors/logbooks/:id/revision                - Request logbook revision
#    - GET    /mentors/skill-gaps                           - Get skill gap analysis
#    - GET    /mentors/department/performance               - Get department performance
#    - POST   /mentors/interventions                        - Create intervention
#    - GET    /mentors/interventions                        - Get all interventions
#    - GET    /mentors/students/:id/progress                - Get student progress
#
# 5. ADMIN (/api/admins/*)
#    - GET    /admins/dashboard                             - Get admin dashboard
#    - GET    /admins/companies/pending                     - Get pending companies
#    - GET    /admins/companies/:id                         - Get company details
#    - POST   /admins/companies/:id/verify                  - Verify company
#    - POST   /admins/companies/:id/reject                  - Reject company
#    - POST   /admins/companies/:id/suspend                - Suspend company
#    - POST   /admins/students/import                       - Bulk import students
#    - GET    /admins/students/import/:jobId                - Get import job status
#    - POST   /admins/mentors/assign                        - Assign mentor
#    - POST   /admins/credits/process                       - Process credits
#    - POST   /admins/reports/system                        - Generate system report
#    - GET    /admins/analytics/system                      - Get system analytics
#    - GET    /admins/analytics/college                     - Get college analytics
#    - GET    /admins/system/health                         - Get system health
#    - GET    /admins/ai/usage                             - Get AI usage stats
#
# 6. TESTING (/api/tests/*) - See routes/tests.js for JSDoc documentation
#    - POST   /tests/email                                 - Test email service
#    - POST   /tests/s3                                    - Test S3 storage
#    - POST   /tests/queue                                 - Test queue service
#    - POST   /tests/gemini                                 - Test Gemini AI
#    - GET    /tests/status                                - Get services status
#
# 7. HEALTH CHECK
#    - GET    /api/health                                  - API health check

paths:
  # ==================== AUTHENTICATION ENDPOINTS ====================
  /api/auth/students/register:
    post:
      summary: Register a new student
      description: Create a new student account with Firebase authentication
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, profile]
              properties:
                email:
                  type: string
                  format: email
                  example: "student@university.edu"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "SecurePass123!"
                profile:
                  type: object
                  required: [name, department, year, college]
                  properties:
                    name:
                      type: string
                      example: "John Doe"
                    department:
                      type: string
                      example: "Computer Science"
                    year:
                      type: integer
                      minimum: 1
                      maximum: 4
                      example: 3
                    college:
                      type: string
                      example: "University Name"
                    rollNumber:
                      type: string
                      example: "CS2024001"
                    phone:
                      type: string
                      example: "+919876543210"
                    bio:
                      type: string
                      example: "Passionate about software development"
                    skills:
                      type: array
                      items:
                        type: string
                      example: ["JavaScript", "Node.js", "React"]
                    interests:
                      type: array
                      items:
                        type: string
                      example: ["Web Development", "AI"]
                phone:
                  type: string
                  example: "+919876543210"
                preferences:
                  type: object
                  properties:
                    notifications:
                      type: object
                      properties:
                        email:
                          type: boolean
                          example: true
                        sms:
                          type: boolean
                          example: false
      responses:
        '201':
          description: Student registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          student:
                            $ref: '#/components/schemas/Student'
                          token:
                            type: string
                            example: "firebase-id-token"
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/companies/register:
    post:
      summary: Register a new company
      description: Create a new company account with Firebase authentication
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, companyName, documents]
              properties:
                email:
                  type: string
                  format: email
                  example: "contact@company.com"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "SecurePass123!"
                companyName:
                  type: string
                  example: "Tech Solutions Inc"
                website:
                  type: string
                  format: uri
                  example: "https://techsolutions.com"
                phone:
                  type: string
                  example: "+919876543210"
                address:
                  type: string
                  example: "123 Business Park, Mumbai"
                documents:
                  type: object
                  required: [cinNumber]
                  properties:
                    cinNumber:
                      type: string
                      example: "U72900MH2024PTC123456"
                    gstCertificate:
                      type: string
                      format: uri
                      example: "https://example.com/gst.pdf"
                pointOfContact:
                  type: object
                  properties:
                    name:
                      type: string
                      example: "Jane Smith"
                    designation:
                      type: string
                      example: "HR Manager"
                    email:
                      type: string
                      format: email
                      example: "hr@techsolutions.com"
                    phone:
                      type: string
                      example: "+919876543211"
      responses:
        '201':
          description: Company registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          company:
                            $ref: '#/components/schemas/Company'
                          token:
                            type: string
        '400':
          description: Validation error
        '409':
          description: Email already registered

  /api/auth/mentors/register:
    post:
      summary: Register a new mentor
      description: Create a new mentor account with Firebase authentication
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, profile]
              properties:
                email:
                  type: string
                  format: email
                  example: "mentor@university.edu"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "SecurePass123!"
                profile:
                  type: object
                  required: [name, department]
                  properties:
                    name:
                      type: string
                      example: "Dr. Jane Smith"
                    department:
                      type: string
                      example: "Computer Science"
                    designation:
                      type: string
                      example: "Associate Professor"
                    phone:
                      type: string
                      example: "+919876543210"
                    bio:
                      type: string
                      example: "Experienced mentor with 10+ years in academia"
                    expertiseAreas:
                      type: array
                      items:
                        type: string
                      example: ["Web Development", "Database Systems"]
                preferences:
                  type: object
                  properties:
                    notifications:
                      type: object
                      properties:
                        email:
                          type: boolean
                          example: true
                        sms:
                          type: boolean
                          example: false
      responses:
        '201':
          description: Mentor registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          mentor:
                            $ref: '#/components/schemas/Mentor'
                          firebaseUid:
                            type: string
        '400':
          description: Validation error
        '409':
          description: Email already registered

  /api/auth/admins/register:
    post:
      summary: Register a new admin
      description: Create a new admin account with Firebase authentication. In production, requires super_admin authentication.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                  example: "admin@prashiskshan.com"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "SecurePass123!"
                name:
                  type: string
                  example: "Admin User"
                role:
                  type: string
                  enum: [super_admin, admin, support]
                  default: admin
                  example: "admin"
                permissions:
                  type: array
                  items:
                    type: string
                  example: ["manage_users", "manage_companies"]
      responses:
        '201':
          description: Admin registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          admin:
                            type: object
                            properties:
                              adminId:
                                type: string
                              email:
                                type: string
                              name:
                                type: string
                              role:
                                type: string
                          firebaseUid:
                            type: string
        '400':
          description: Validation error
        '403':
          description: Forbidden - Only super admins can create admin accounts in production
        '409':
          description: Email already registered

  /api/auth/send-password-reset:
    post:
      summary: Send password reset email
      description: Send a password reset link to the user's email address
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
      responses:
        '200':
          description: Password reset email sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '400':
          description: Email is required
        '404':
          description: User not found

  /api/auth/verify-email:
    post:
      summary: Send email verification
      description: Send an email verification link to the authenticated user's email
      tags: [Authentication]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Verification email sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '401':
          description: Unauthorized
        '400':
          description: User email not found

    get:
      summary: Verify email
      description: Verify user email using the verification code (oobCode) from the email link
      tags: [Authentication]
      parameters:
        - in: query
          name: oobCode
          required: true
          schema:
            type: string
          description: Verification code from email link
          example: "ABC123XYZ"
      responses:
        '200':
          description: Email verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '400':
          description: Invalid or expired verification code

  /api/auth/login:
    post:
      summary: User login
      description: Authenticate user with Firebase ID token and get user profile
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idToken]
              properties:
                idToken:
                  type: string
                  description: Firebase ID token obtained from client authentication
                  example: "firebase-id-token-string"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            type: object
                            description: User profile based on role (Student, Company, Mentor, or Admin)
                          token:
                            type: string
        '401':
          description: Invalid token
        '404':
          description: User profile not found

  /api/auth/me:
    get:
      summary: Get current user profile
      description: Retrieve the authenticated user's profile information
      tags: [Authentication]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            type: object
        '401':
          description: Unauthorized

    patch:
      summary: Update user profile
      description: Update the authenticated user's profile information
      tags: [Authentication]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                profile:
                  type: object
                  description: Profile fields to update (varies by user role)
      responses:
        '200':
          description: Profile updated successfully
        '401':
          description: Unauthorized

  /api/auth/password:
    post:
      summary: Change password
      description: Change user password (requires re-authentication)
      tags: [Authentication]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword, idToken]
              properties:
                newPassword:
                  type: string
                  format: password
                  minLength: 8
                  example: "NewSecurePass123!"
                idToken:
                  type: string
                  description: Current Firebase ID token for verification
      responses:
        '200':
          description: Password changed successfully
        '401':
          description: Unauthorized or invalid token

  /api/auth/profile/image:
    post:
      summary: Upload profile image
      description: Upload a profile image for the authenticated user
      tags: [Authentication]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file (max 5MB, formats: jpg, png, webp)
      responses:
        '200':
          description: Image uploaded successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          imageUrl:
                            type: string
                            format: uri
        '401':
          description: Unauthorized
        '400':
          description: Invalid file format or size

  /api/auth/profile/resume:
    post:
      summary: Upload resume
      description: Upload a resume document (students only)
      tags: [Authentication]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file (max 10MB)
      responses:
        '200':
          description: Resume uploaded successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Students only

  /api/auth/account:
    delete:
      summary: Delete account
      description: Soft delete the authenticated user's account
      tags: [Authentication]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Account deleted successfully
        '401':
          description: Unauthorized

  # ==================== STUDENT ENDPOINTS ====================
  /api/students/dashboard:
    get:
      summary: Get student dashboard
      description: Retrieve dashboard data including stats, recent activities, and recommendations
      tags: [Students]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard data retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          student:
                            $ref: '#/components/schemas/Student'
                          stats:
                            type: object
                            properties:
                              totalApplications:
                                type: integer
                              activeInternships:
                                type: integer
                              completedInternships:
                                type: integer
                              totalCredits:
                                type: number
                              totalHours:
                                type: number
                          recentApplications:
                            type: array
                            items:
                              $ref: '#/components/schemas/Application'
                          recommendedInternships:
                            type: array
                            items:
                              $ref: '#/components/schemas/Internship'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Students only

  /api/students/internships:
    get:
      summary: Browse available internships
      description: Get a list of available internships with filtering and pagination
      tags: [Students]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: department
          schema:
            type: string
          description: Filter by department
        - in: query
          name: location
          schema:
            type: string
          description: Filter by location
        - in: query
          name: workMode
          schema:
            type: string
            enum: [remote, onsite, hybrid]
          description: Filter by work mode
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Items per page
      responses:
        '200':
          description: Internships retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Internship'
                          pagination:
                            $ref: '#/components/schemas/Pagination'

  /api/students/internships/recommended:
    get:
      summary: Get recommended internships
      description: Get personalized internship recommendations based on student profile
      tags: [Students]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Recommendations retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          internships:
                            type: array
                            items:
                              $ref: '#/components/schemas/Internship'
                          reasons:
                            type: array
                            items:
                              type: string
                            description: Reasons why these internships are recommended

  /api/students/applications:
    post:
      summary: Apply to internship
      description: Submit an application for an internship
      tags: [Students]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [internshipId, coverLetter]
              properties:
                internshipId:
                  type: string
                  example: "INT-2024001"
                coverLetter:
                  type: string
                  example: "I am writing to express my interest..."
                resumeUrl:
                  type: string
                  format: uri
                  example: "https://storage.example.com/resumes/resume.pdf"
      responses:
        '201':
          description: Application submitted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          application:
                            $ref: '#/components/schemas/Application'
        '400':
          description: Validation error or internship not found
        '409':
          description: Already applied to this internship

    get:
      summary: Get my applications
      description: Retrieve all applications submitted by the student
      tags: [Students]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected, shortlisted, withdrawn]
          description: Filter by application status
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Applications retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          applications:
                            type: array
                            items:
                              $ref: '#/components/schemas/Application'
                          pagination:
                            $ref: '#/components/schemas/Pagination'

  /api/students/applications/{applicationId}:
    delete:
      summary: Withdraw application
      description: Withdraw a submitted application
      tags: [Students]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: applicationId
          required: true
          schema:
            type: string
          example: "APP-2024001"
      responses:
        '200':
          description: Application withdrawn successfully
        '404':
          description: Application not found
        '400':
          description: Cannot withdraw application in current status

  /api/students/modules/recommended:
    get:
      summary: Get recommended modules
      description: Get learning modules recommended for the student
      tags: [Students]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Recommended modules retrieved successfully

  /api/students/modules/start:
    post:
      summary: Start a learning module
      description: Begin working on a learning module
      tags: [Students]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
