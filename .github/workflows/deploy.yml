name: Deploy Backend to EC2 (Docker Compose)

on:
  push:
    branches: [ "main" ]   # Trigger only on main

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/prashiskshan-backend:latest

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
    - name: Deploy on EC2 using Docker Compose
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e

          echo "👉 Logging into Docker Hub..."
          docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

          echo "👉 Moving into project directory..."
          cd /home/${{ secrets.EC2_USER }}/prashiskshan-backend

          echo "👉 Pulling newest images..."
          docker compose pull

          echo "👉 Starting services..."
          docker compose up -d

          echo "👉 Removing old images..."
          docker system prune -f

          echo "🚀 Deployment completed successfully!"
